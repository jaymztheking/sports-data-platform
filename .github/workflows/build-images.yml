name: Build Images

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
  workflow_dispatch:

jobs:
  build-images:
    runs-on: self-hosted
    permissions:
      packages: write
    strategy:
      matrix:
        image:
          - name: airflow
            context: .
            dockerfile: docker/airflow/Dockerfile
          - name: spark
            context: .
            dockerfile: docker/spark/Dockerfile
          - name: mlflow
            context: .
            dockerfile: docker/mlflow/Dockerfile
          - name: ingestion
            context: .
            dockerfile: docker/ingestion/Dockerfile
          - name: ingestion-spark
            context: .
            dockerfile: docker/ingestion-spark/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:latest
          platforms: linux/arm64
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
