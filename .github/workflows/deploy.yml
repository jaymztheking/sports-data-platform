name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "docker/**"
  workflow_dispatch:

jobs:
  build-images:
    runs-on: self-hosted
    permissions:
      packages: write
    strategy:
      matrix:
        image:
          - name: airflow
            context: .
            dockerfile: docker/airflow/Dockerfile
          - name: spark
            context: .
            dockerfile: docker/spark/Dockerfile
          - name: mlflow
            context: .
            dockerfile: docker/mlflow/Dockerfile
          - name: ingestion
            context: .
            dockerfile: docker/ingestion/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:${{ github.sha }},ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:latest
          platforms: linux/arm64
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  deploy:
    needs: build-images
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d \
            | sed "s|https://127.0.0.1:6443|https://${{ secrets.K3S_SERVER_IP }}:6443|" \
            > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Terraform
        run: |
          if ! command -v terraform &>/dev/null; then
            curl -fsSL https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_arm64.zip -o /tmp/terraform.zip
            unzip -q /tmp/terraform.zip -d /tmp
            sudo mv /tmp/terraform /usr/local/bin/terraform
            rm /tmp/terraform.zip
          fi
          terraform version

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_minio_root_password: ${{ secrets.MINIO_ROOT_PASSWORD }}
          TF_VAR_airflow_fernet_key: ${{ secrets.AIRFLOW_FERNET_KEY }}
          TF_VAR_image_registry: ghcr.io/${{ github.repository }}
          TF_VAR_spark_image_tag: ${{ github.sha }}
          TF_VAR_airflow_image_tag: ${{ github.sha }}
          TF_VAR_mlflow_image_tag: ${{ github.sha }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_minio_root_password: ${{ secrets.MINIO_ROOT_PASSWORD }}
          TF_VAR_airflow_fernet_key: ${{ secrets.AIRFLOW_FERNET_KEY }}
          TF_VAR_image_registry: ghcr.io/${{ github.repository }}
          TF_VAR_spark_image_tag: ${{ github.sha }}
          TF_VAR_airflow_image_tag: ${{ github.sha }}
          TF_VAR_mlflow_image_tag: ${{ github.sha }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
