sports_data_platform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'sports_data') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'changeme') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'sports_data') }}"
      schema: public
      threads: 4
