name: sports_data_platform
version: "0.1.0"
config-version: 2

profile: sports_data_platform

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  sports_data_platform:
    staging:
      +materialized: view
      +schema: staging
      mlb:
        +tags: ["mlb", "staging"]
    intermediate:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
      mlb:
        +tags: ["mlb", "marts"]
