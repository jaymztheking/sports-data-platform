executor: LocalExecutor

# Disable bundled Bitnami PostgreSQL — use the existing postgresql release instead.
postgresql:
  enabled: false

webserver:
  service:
    type: NodePort
    ports:
      - name: airflow-ui
        port: 8080
        targetPort: airflow-ui
        nodePort: 30007
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

scheduler:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi

migrationJob:
  useHelmHooks: false

data:
  metadataConnection:
    user: postgres
    host: postgresql
    port: 5432
    db: airflow
    sslmode: disable
    # pass is injected via terraform set_sensitive (var.postgres_password)

dags:
  gitSync:
    enabled: true
    repo: https://github.com/jaymztheking/sports-data-platform.git
    branch: main
    subPath: dags
    wait: 60

config:
  core:
    load_examples: "False"
  webserver:
    expose_config: "True"

env:
  - name: AIRFLOW_CONN_SPARK_DEFAULT
    value: "spark://spark-master:7077"
  - name: AIRFLOW_CONN_MINIO_DEFAULT
    value: "aws://minioadmin:minioadmin@?endpoint_url=http://minio:9000"
